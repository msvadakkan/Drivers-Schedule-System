<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Driver Schedule System</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #880050 0%, #d4006c 100%);
      text-align: center;
      padding: 24px;
    }
    .hero-icon { font-size: 72px; margin-bottom: 16px; }
    .hero h1 {
      font-size: 36px;
      font-weight: 800;
      color: #fff;
      margin-bottom: 10px;
    }
    .hero p {
      font-size: 16px;
      color: rgba(255,255,255,.8);
      margin-bottom: 36px;
      max-width: 420px;
    }
    .hero-btn {
      display: inline-block;
      background: #fff;
      color: #b5006c;
      font-size: 16px;
      font-weight: 700;
      padding: 14px 40px;
      border-radius: 10px;
      text-decoration: none;
      box-shadow: 0 8px 24px rgba(0,0,0,.2);
      transition: transform .15s, box-shadow .15s;
    }
    .hero-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(0,0,0,.25);
    }
    .roles {
      display: flex;
      gap: 20px;
      margin-top: 48px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .role-card {
      background: rgba(255,255,255,.14);
      border: 1px solid rgba(255,255,255,.25);
      border-radius: 12px;
      padding: 20px 28px;
      color: #fff;
      min-width: 140px;
    }
    .role-card .rc-icon { font-size: 32px; margin-bottom: 8px; }
    .role-card .rc-label { font-size: 14px; font-weight: 600; opacity: .9; }
  </style>
</head>
<body>
  <div class="hero">
    <div class="hero-icon">🚐</div>
    <h1>Driver Schedule System</h1>
    <p>Manage and view driver &amp; nurse schedules in one place.</p>

    <a href="login.html" class="hero-btn">🔐 Go to Login</a>

    <div class="roles">
      <div class="role-card">
        <div class="rc-icon">🛡️</div>
        <div class="rc-label">Admin</div>
      </div>
      <div class="role-card">
        <div class="rc-icon">🚗</div>
        <div class="rc-label">Driver</div>
      </div>
      <div class="role-card">
        <div class="rc-icon">👩‍⚕️</div>
        <div class="rc-label">Nurse</div>
      </div>
    </div>
  </div>
</body>
</html>

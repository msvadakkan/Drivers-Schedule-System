<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Driver Schedule System — Magenta Home Health</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    @keyframes heroFade {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #880050 0%, #d4006c 100%);
      text-align: center;
      padding: 32px 24px;
    }
    .hero-inner {
      animation: heroFade .6s ease forwards;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .hero-logo {
      height: 72px;
      width: auto;
      margin-bottom: 24px;
      filter: brightness(0) invert(1);
    }
    .hero h1 {
      font-size: 32px;
      font-weight: 800;
      color: #fff;
      margin-bottom: 10px;
    }
    .hero p {
      font-size: 15px;
      color: rgba(255,255,255,.8);
      margin-bottom: 36px;
      max-width: 400px;
    }
    .hero-btn {
      display: inline-block;
      background: #fff;
      color: #b5006c;
      font-size: 16px;
      font-weight: 700;
      padding: 14px 44px;
      border-radius: 10px;
      text-decoration: none;
      box-shadow: 0 8px 24px rgba(0,0,0,.25);
      transition: transform .15s, box-shadow .15s;
    }
    .hero-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(0,0,0,.3);
    }
    .roles {
      display: flex;
      gap: 16px;
      margin-top: 48px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .role-card {
      background: rgba(255,255,255,.14);
      border: 1px solid rgba(255,255,255,.25);
      border-radius: 12px;
      padding: 20px 28px;
      color: #fff;
      min-width: 130px;
    }
    .role-card .rc-icon  { font-size: 30px; margin-bottom: 8px; }
    .role-card .rc-label { font-size: 13px; font-weight: 600; opacity: .9; }
    .hero-credit {
      margin-top: 40px;
      font-size: 12px;
      color: rgba(255,255,255,.4);
    }
  </style>
</head>
<body>
  <div class="hero">
    <div class="hero-inner">
      <img src="https://magenta-homehealth.com/wp-content/uploads/2025/12/Logo-MHH-e1765135439415.png"
           alt="Magenta Home Health" class="hero-logo" />
      <h1>Driver Schedule System</h1>
      <p>Manage and view driver &amp; nurse schedules in one place.</p>

      <a href="login.html" class="hero-btn" id="login-btn">🔐 Go to Login</a>

      <div class="roles">
        <div class="role-card">
          <div class="rc-icon">🚗</div>
          <div class="rc-label">Driver</div>
        </div>
        <div class="role-card">
          <div class="rc-icon">👩‍⚕️</div>
          <div class="rc-label">Nurse</div>
        </div>
      </div>

      <div class="hero-credit">Developed by msvadakkan</div>
    </div>
  </div>

  <script>
    (async () => {
      try {
        const r = await fetch('api/setup.php');
        if (!r.ok) return;
        const d = await r.json();
        if (d.needed) document.getElementById('login-btn').href = 'setup.html';
      } catch {}
    })();
  </script>
</body>
</html>

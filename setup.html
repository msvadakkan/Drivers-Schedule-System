<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Setup — Driver Schedule System</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .setup-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #880050 0%, #d4006c 100%);
      padding: 20px;
    }
    .setup-card {
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 24px 64px rgba(0,0,0,.22);
      padding: 44px;
      width: 100%;
      max-width: 440px;
      animation: popIn .4s ease;
    }
    @keyframes popIn {
      from { opacity: 0; transform: scale(.92); }
      to   { opacity: 1; transform: scale(1); }
    }
    .setup-header { text-align: center; margin-bottom: 32px; }
    .setup-icon { font-size: 52px; }
    .setup-header h1 { font-size: 22px; font-weight: 800; color: #b5006c; margin-top: 10px; }
    .setup-header p  { color: #64748b; font-size: 13px; margin-top: 6px; line-height: 1.6; }
    .setup-step {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #fce4ec;
      border-radius: 10px;
      padding: 10px 14px;
      margin-bottom: 24px;
      font-size: 13px;
      color: #b5006c;
      font-weight: 600;
    }
    .step-badge {
      background: #b5006c;
      color: #fff;
      border-radius: 99px;
      font-size: 11px;
      font-weight: 700;
      padding: 2px 8px;
      white-space: nowrap;
    }
    .password-hint { font-size: 11px; color: #94a3b8; margin-top: 4px; }
    .success-state { text-align: center; padding: 20px 0; }
    .success-state .s-icon { font-size: 56px; margin-bottom: 12px; }
    .success-state h2 { font-size: 20px; font-weight: 800; color: #b5006c; margin-bottom: 8px; }
    .success-state p  { color: #64748b; font-size: 13px; margin-bottom: 24px; }
  </style>
</head>
<body>
  <div class="setup-page" style="flex-direction:column;gap:16px">
    <div class="setup-card">

      <div class="setup-header">
        <img src="https://magenta-homehealth.com/wp-content/uploads/2025/12/Logo-MHH-e1765135439415.png"
             alt="Magenta Home Health" style="height:64px;width:auto;margin-bottom:14px" />
        <h1>Driver Schedule System</h1>
        <p>Welcome! Create your administrator account<br>to get started.</p>
      </div>

      <div class="setup-step">
        <span class="step-badge">Step 1 of 1</span>
        Create Admin Account
      </div>

      <div id="error-msg" class="alert-error" style="display:none"></div>

      <div id="form-area">
        <form id="setup-form">
          <div class="form-group">
            <label>Full Name *</label>
            <input id="f-name" placeholder="e.g. Sarah Admin" required autocomplete="name" />
          </div>
          <div class="form-group">
            <label>Email Address *</label>
            <input id="f-email" type="email" placeholder="admin@yourcompany.com" required autocomplete="email" />
          </div>
          <div class="form-group">
            <label>Password *</label>
            <input id="f-password" type="password" placeholder="Minimum 8 characters" required autocomplete="new-password" />
            <div class="password-hint">At least 8 characters</div>
          </div>
          <div class="form-group">
            <label>Confirm Password *</label>
            <input id="f-confirm" type="password" placeholder="Re-enter your password" required autocomplete="new-password" />
          </div>
          <button type="submit" class="btn btn-primary" id="submit-btn"
            style="width:100%;justify-content:center;padding:13px;font-size:15px;margin-top:6px">
            Create Admin Account
          </button>
        </form>
      </div>

      <div id="success-area" class="success-state" style="display:none">
        <div class="s-icon">✅</div>
        <h2>Setup Complete!</h2>
        <p>Your admin account has been created.<br>You can now log in to manage schedules.</p>
        <a href="login.html" class="btn btn-primary" style="justify-content:center;width:100%;padding:13px;font-size:15px">
          Go to Login
        </a>
      </div>

    </div>
    <div style="font-size:12px;color:rgba(255,255,255,.45)">Developed by msvadakkan</div>
  </div>

  <script>
    (async () => {
      try {
        const r = await fetch('api/setup.php');
        const d = await r.json();
        if (!d.needed) location.href = 'login.html';
      } catch {}
    })();

    document.getElementById('setup-form').addEventListener('submit', async e => {
      e.preventDefault();
      const err = document.getElementById('error-msg');
      const btn = document.getElementById('submit-btn');
      err.style.display = 'none';

      const name     = document.getElementById('f-name').value.trim();
      const email    = document.getElementById('f-email').value.trim();
      const password = document.getElementById('f-password').value;
      const confirm  = document.getElementById('f-confirm').value;

      if (password !== confirm) {
        err.textContent = 'Passwords do not match.';
        err.style.display = 'block';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Creating account…';

      try {
        const res  = await fetch('api/setup.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Setup failed.');

        document.getElementById('form-area').style.display   = 'none';
        document.getElementById('success-area').style.display = '';
      } catch (ex) {
        err.textContent = ex.message;
        err.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Create Admin Account';
      }
    });
  </script>
</body>
</html>

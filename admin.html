<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Driver Schedule System</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <nav class="app-nav">
    <div class="brand">🚐 Driver Schedule System</div>
    <div class="nav-right">
      <span class="user-name" id="nav-name"></span>
      <span class="role-badge">Admin</span>
      <button class="btn btn-ghost btn-sm" id="logout-btn">Logout</button>
    </div>
  </nav>

  <div class="main-content">
    <!-- Stats -->
    <div class="stats-row" id="stats-row">
      <div class="stat-card"><div class="stat-num" id="stat-drivers">—</div><div class="stat-label">Drivers</div></div>
      <div class="stat-card"><div class="stat-num" id="stat-nurses">—</div><div class="stat-label">Nurses</div></div>
      <div class="stat-card"><div class="stat-num" id="stat-total">—</div><div class="stat-label">Schedules</div></div>
      <div class="stat-card"><div class="stat-num" id="stat-upcoming">—</div><div class="stat-label">Upcoming</div></div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab-btn active" data-tab="schedules">📅 Schedules</button>
      <button class="tab-btn" data-tab="drivers">🚗 Drivers</button>
      <button class="tab-btn" data-tab="nurses">👩‍⚕️ Nurses</button>
    </div>

    <!-- Tab panels -->
    <div id="panel-schedules" class="tab-panel"></div>
    <div id="panel-drivers"   class="tab-panel" style="display:none"></div>
    <div id="panel-nurses"    class="tab-panel" style="display:none"></div>
  </div>

  <!-- Modal -->
  <div class="modal-overlay hidden" id="modal-overlay">
    <div class="modal" id="modal-box">
      <h3 id="modal-title"></h3>
      <div id="modal-error" class="alert-error" style="display:none"></div>
      <div id="modal-body"></div>
    </div>
  </div>

  <script src="js/admin.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Driver Schedule System</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="login-page" style="flex-direction:column;gap:16px">
    <div class="login-card">
      <div class="login-logo">
        <img src="https://magenta-homehealth.com/wp-content/uploads/2025/12/Logo-MHH-e1765135439415.png"
             alt="Magenta Home Health" style="height:64px;width:auto;margin-bottom:14px" />
        <p>Driver Schedule System</p>
        <p style="font-size:12px;margin-top:4px">Sign in to view your schedule</p>
      </div>

      <div id="error-msg" class="alert-error" style="display:none"></div>

      <form id="login-form">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input id="email" type="email" placeholder="your@email.com" required autocomplete="email" />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input id="password" type="password" placeholder="••••••••" required autocomplete="current-password" />
        </div>
        <button type="submit" class="btn btn-primary" id="submit-btn"
          style="width:100%;justify-content:center;padding:12px;font-size:15px;margin-top:8px">
          Sign In
        </button>
      </form>
    </div>
  </div>
    <div style="font-size:12px;color:rgba(255,255,255,.45)">Developed by msvadakkan</div>
  </div>

  <script>
    (async () => {
      try {
        const setup = await fetch('api/setup.php');
        const sd    = await setup.json();
        if (sd.needed) { location.href = 'setup.html'; return; }

        const r = await fetch('api/me.php');
        if (r.ok) {
          const u = await r.json();
          location.href = u.role === 'admin' ? 'admin.html' : 'dashboard.html';
        }
      } catch {}
    })();

    document.getElementById('login-form').addEventListener('submit', async e => {
      e.preventDefault();
      const btn = document.getElementById('submit-btn');
      const err = document.getElementById('error-msg');
      err.style.display = 'none';
      btn.textContent = 'Signing in…';
      btn.disabled = true;

      try {
        const res = await fetch('api/login.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('email').value,
            password: document.getElementById('password').value
          })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Login failed');
        location.href = data.user.role === 'admin' ? 'admin.html' : 'dashboard.html';
      } catch (ex) {
        err.textContent = ex.message;
        err.style.display = 'block';
        btn.textContent = 'Sign In';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
